<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<div th:fragment="main_chat">
  <div class="chat-header">
    <div class="left-hrader">
      <div class="header-title" th:text="${room.name}">
        ルーム名
      </div>
    </div>

    <div class="right-header">
      <div class="header-button">
        <form th:action="@{/rooms/{roomId}/delete(roomId=${room.id})}" method="post">
          <input type="submit" value="チャットを終了する">
        </form>
      </div>
    </div>
  </div>

  <div class="messages">
    <div th:each="message : ${messages}" class="message">
      <div class="upper-message">
        <div th:text="${message.user.name}" class="message-user">ユーザー名</div>
        <div th:text="${#dates.format(message.createdAt, 'yyyy/MM/dd HH:mm:ss')}" class="message-date">投稿日時</div>
      </div>
      <div class="lower-message">
        <div th:text="${message.content}" class="message-content">メッセージ文</div>
      </div>
    </div>
  </div>  

  <form th:action="@{/rooms/{roomId}/messages(roomId=${room.id})}" th:object="${messageForm}" method="post" class="form">
    <div class="form-input">
      <input th:field="*{content}" type="text" placeholder="Type a message" class="form-message">
      <label class="form-image">
        <span class="image-file">画像</span>
        <input type="file" class="hidden">
      </label>
    </div>
    <input type="submit" value="送信" class="form-submit">
  </form>
</div>
</html>
